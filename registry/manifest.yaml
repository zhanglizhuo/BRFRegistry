# BRF Benchmark Registry Manifest
# https://github.com/zhanglizhuo/BRFRegistry

version: "1.5"
release_date: "2026-06-30"
total_datasets: 18

description: >
  Curated collection of group-aware educational benchmark datasets
  with standardized metadata, reproducibility scripts, and BRF
  (Benchmark Reliability Framework) audit results.
  Includes alternative grouping views (teacher/school for ASSISTments,
  city/profession for Student Depression) for meta-analysis.

datasets:
  - oulad
  - student_dropout
  - xapi_edu
  - entrance_exam
  - uci_student
  - higher_ed
  - mm_tba
  - tae
  - turkiye
  - assistments
  - mathe
  - colleges_aaup
  - colleges_usnews
  - college_scorecard
  - oli
  - student_depression
  - student_depression_prof
  - assistments_school

brf_results:
  reliable: 14
  void: 4
  fragile: 0

schema_version: "2.0.0"
